name: Fetch KoboToolbox Data

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:   # Allows manual trigger from GitHub Actions tab

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch data from KoboToolbox
        run: |
          mkdir -p data

          # Fetch up to 3000 records from KoboToolbox
          curl -s \
            -H "Authorization: Token ${{ secrets.KOBO_TOKEN }}" \
            "https://kf.kobotoolbox.org/api/v2/assets/${{ secrets.KOBO_ASSET_UID }}/data/?format=json&limit=3000" \
            -o data/kobo_latest.json

          # Verify the file was created and is valid JSON
          python3 -c "
          import json, sys
          with open('data/kobo_latest.json') as f:
              data = json.load(f)
          count = len(data.get('results', []))
          print(f'Successfully fetched {count} records')
          " || (echo 'ERROR: Invalid JSON received from KoboToolbox' && cat data/kobo_latest.json && exit 1)

      - name: Commit and push data file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/kobo_latest.json
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update kobo data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
